# Yiji CRM — nginx edge (final deployment architecture).
#
# Serves the two operator SPAs + the embeddable widget as static files, and
# reverse-proxies the backend over TLS to the LOOPBACK services:
#
#   agent.DOMAIN   →  static  crm-app-frontend/apps/agent-portal/dist
#   admin.DOMAIN   →  static  crm-app-frontend/apps/admin-portal/dist
#   widget.DOMAIN  →  static  crm-app-frontend/apps/chat-widget/dist
#   api.DOMAIN     →  proxy   127.0.0.1:8055   (Directus, Docker)
#   ws.DOMAIN      →  proxy   127.0.0.1:8080   (socket-gateway, PM2 — WebSocket)
#   ai.DOMAIN      →  proxy   127.0.0.1:8085   (ai-gateway, PM2)
#
# SETUP (once):
#   1. Replace crm.example.com below with your domain, and the /srv/yiji/* roots
#      with where the built SPA dist dirs live:
#        sudo sed -i 's/crm\.example\.com/your.domain/g' yiji-crm.conf
#   2. Point DNS A/AAAA records for agent. admin. widget. api. ws. ai. at this host.
#   3. Install: sudo cp yiji-crm.conf /etc/nginx/sites-available/yiji-crm.conf
#              sudo ln -s ../sites-available/yiji-crm.conf /etc/nginx/sites-enabled/
#   4. Obtain certs (certbot edits the :443 blocks' ssl_certificate lines in place):
#        sudo certbot --nginx \
#          -d agent.crm.example.com -d admin.crm.example.com -d widget.crm.example.com \
#          -d api.crm.example.com   -d ws.crm.example.com    -d ai.crm.example.com
#   5. sudo nginx -t && sudo systemctl reload nginx
#
# The ssl_certificate paths below assume a single combined cert under the agent
# hostname; if you issue per-host certs, certbot rewrites each block for you.

# ── Shared snippets ──────────────────────────────────────────────────────────
# Standard proxy headers (preserve client + scheme so Directus/services build
# correct URLs and see the real IP behind nginx).
map $http_upgrade $connection_upgrade {
	default upgrade;
	'' close;
}

# HTTP → HTTPS redirect (+ ACME http-01 challenge passthrough) for every host.
server {
	listen 80;
	listen [::]:80;
	server_name agent.crm.example.com admin.crm.example.com widget.crm.example.com
		api.crm.example.com ws.crm.example.com ai.crm.example.com;

	location /.well-known/acme-challenge/ {
		root /var/www/certbot;
	}
	location / {
		return 301 https://$host$request_uri;
	}
}

# ── Static SPAs ──────────────────────────────────────────────────────────────
server {
	listen 443 ssl;
	listen [::]:443 ssl;
	http2 on;
	server_name agent.crm.example.com;

	ssl_certificate /etc/letsencrypt/live/agent.crm.example.com/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/agent.crm.example.com/privkey.pem;

	root /srv/yiji/agent-portal/dist;
	index index.html;
	gzip on;
	gzip_types text/css application/javascript application/json image/svg+xml;

	add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
	add_header X-Content-Type-Options "nosniff" always;
	add_header X-Frame-Options "DENY" always;
	add_header Referrer-Policy "strict-origin-when-cross-origin" always;
	add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://api.crm.example.com; font-src 'self' data:; connect-src 'self' https://api.crm.example.com https://ai.crm.example.com https://ws.crm.example.com wss://ws.crm.example.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;

	# Long-cache hashed assets; never cache the HTML entry (SPA shell).
	location /assets/ {
		expires 1y;
		add_header Cache-Control "public, immutable";
	}
	location / {
		try_files $uri /index.html;
	}
}

server {
	listen 443 ssl;
	listen [::]:443 ssl;
	http2 on;
	server_name admin.crm.example.com;

	ssl_certificate /etc/letsencrypt/live/agent.crm.example.com/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/agent.crm.example.com/privkey.pem;

	root /srv/yiji/admin-portal/dist;
	index index.html;
	gzip on;
	gzip_types text/css application/javascript application/json image/svg+xml;

	add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
	add_header X-Content-Type-Options "nosniff" always;
	add_header X-Frame-Options "DENY" always;
	add_header Referrer-Policy "strict-origin-when-cross-origin" always;
	add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://api.crm.example.com; font-src 'self' data:; connect-src 'self' https://api.crm.example.com https://ai.crm.example.com https://ws.crm.example.com wss://ws.crm.example.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;

	location /assets/ {
		expires 1y;
		add_header Cache-Control "public, immutable";
	}
	location / {
		try_files $uri /index.html;
	}
}

# Embeddable widget bundle (loaded cross-origin by host pages → permissive CORS
# for the static asset only; frame-ancestors NOT locked since it's embedded).
server {
	listen 443 ssl;
	listen [::]:443 ssl;
	http2 on;
	server_name widget.crm.example.com;

	ssl_certificate /etc/letsencrypt/live/agent.crm.example.com/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/agent.crm.example.com/privkey.pem;

	root /srv/yiji/chat-widget/dist;
	gzip on;
	gzip_types application/javascript text/css;

	add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
	add_header X-Content-Type-Options "nosniff" always;
	location / {
		add_header Access-Control-Allow-Origin "*" always;
		try_files $uri /index.html;
	}
}

# ── Reverse proxies ──────────────────────────────────────────────────────────
# Directus (API, auth, private asset storage). client_max_body_size covers the
# 10 MiB attachment cap + multipart overhead.
server {
	listen 443 ssl;
	listen [::]:443 ssl;
	http2 on;
	server_name api.crm.example.com;

	ssl_certificate /etc/letsencrypt/live/agent.crm.example.com/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/agent.crm.example.com/privkey.pem;

	client_max_body_size 12m;
	add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

	location / {
		proxy_pass http://127.0.0.1:8055;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		# Directus realtime (GraphQL subscriptions / /websocket) upgrade support.
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection $connection_upgrade;
	}
}

# socket-gateway — Socket.IO on :8080. WebSocket upgrade is required.
server {
	listen 443 ssl;
	listen [::]:443 ssl;
	http2 on;
	server_name ws.crm.example.com;

	ssl_certificate /etc/letsencrypt/live/agent.crm.example.com/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/agent.crm.example.com/privkey.pem;

	add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

	location / {
		proxy_pass http://127.0.0.1:8080;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection $connection_upgrade;
		# Long-lived sockets: don't cut idle connections at the default 60s.
		proxy_read_timeout 1h;
		proxy_send_timeout 1h;
	}
}

# ai-gateway — :8085.
server {
	listen 443 ssl;
	listen [::]:443 ssl;
	http2 on;
	server_name ai.crm.example.com;

	ssl_certificate /etc/letsencrypt/live/agent.crm.example.com/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/agent.crm.example.com/privkey.pem;

	add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

	location / {
		proxy_pass http://127.0.0.1:8085;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
	}
}
