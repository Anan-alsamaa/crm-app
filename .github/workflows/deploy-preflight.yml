name: Deploy preflight

# Deployment-readiness gates owned by the infra stream. Runs on PRs that touch
# infra surfaces and before any manual deploy. Two independent checks:
#   1. compose-validation   — both compose files parse + satisfy prod rules.
#   2. bootstrap-idempotence — `apply` twice on a fresh DB creates nothing the
#                              second time (parallel-work-plan Stream A #11).

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'services/**'
      - 'directus/**'
      - 'docker-compose*.yml'
      - '.github/workflows/deploy*.yml'

permissions:
  contents: read

# Superseded runs (e.g. rapid successive pushes) are cancelled so the slow
# bootstrap-idempotence job doesn't pile up and starve the Actions runners.
concurrency:
  group: deploy-preflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compose-validation:
    name: Validate compose files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Validate docker-compose.yml
        run: pnpm --filter @yiji/directus-bootstrap validate-compose
      - name: Validate docker-compose.prod.yml
        run: pnpm --filter @yiji/directus-bootstrap validate-compose:prod

  bootstrap-idempotence:
    name: Bootstrap idempotence (apply twice → no-op)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: yiji_crm
          POSTGRES_USER: directus
          POSTGRES_PASSWORD: directus
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U directus -d yiji_crm"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DIRECTUS_KEY: ci-test-directus-key-not-secret-32c
      DIRECTUS_SECRET: ci-test-directus-secret-not-secret
      DIRECTUS_ADMIN_EMAIL: e.habibi@anan.sa
      DIRECTUS_ADMIN_PASSWORD: '123456'
      DIRECTUS_PUBLIC_URL: http://localhost:8055
      DIRECTUS_URL: http://localhost:8055
      DB_CLIENT: pg
      DB_HOST: localhost
      DB_PORT: '5432'
      DB_DATABASE: yiji_crm
      DB_USER: directus
      DB_PASSWORD: directus
      REDIS_URL: redis://localhost:6379
      SVC_GATEWAY_TOKEN: dev-gateway-token-for-local-only
      SVC_WORKERS_TOKEN: dev-workers-token-for-local-only
      SVC_AI_TOKEN: dev-ai-token-for-local-only
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Start Directus
        run: |
          docker run -d --name directus --network=host \
            -e KEY=$DIRECTUS_KEY \
            -e SECRET=$DIRECTUS_SECRET \
            -e ADMIN_EMAIL=$DIRECTUS_ADMIN_EMAIL \
            -e ADMIN_PASSWORD=$DIRECTUS_ADMIN_PASSWORD \
            -e PUBLIC_URL=$DIRECTUS_PUBLIC_URL \
            -e DB_CLIENT=pg \
            -e DB_HOST=localhost -e DB_PORT=5432 \
            -e DB_DATABASE=$DB_DATABASE \
            -e DB_USER=$DB_USER -e DB_PASSWORD=$DB_PASSWORD \
            -e REDIS=$REDIS_URL \
            -e CACHE_ENABLED=true -e CACHE_STORE=redis \
            -e WEBSOCKETS_ENABLED=true \
            -e STORAGE_LOCATIONS=local -e STORAGE_LOCAL_DRIVER=local \
            -e STORAGE_LOCAL_ROOT=/directus/uploads \
            -v ${{ github.workspace }}/directus/extensions:/directus/extensions \
            -v ${{ github.workspace }}/directus/snapshot:/directus/snapshot \
            directus/directus:11

      - name: Wait for Directus to be healthy
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8055/server/health > /dev/null; then
              echo "Directus is up after ${i} attempts"
              exit 0
            fi
            sleep 5
          done
          echo "Directus failed to become healthy"
          docker logs directus | tail -100
          exit 1

      - name: Verify bootstrap is idempotent
        run: pnpm --filter @yiji/directus-bootstrap check-idempotence

      - name: Dump Directus logs on failure
        if: failure()
        run: docker logs directus | tail -200 || true
