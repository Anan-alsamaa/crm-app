name: Deploy

# Builds the three Node service images and pushes them to GHCR.
# - Manual runs (workflow_dispatch) let you ship any branch on demand.
# - Pushing a release tag (v1.2.3) builds + tags a versioned release.
#
# Images: ghcr.io/<owner>/<service>:<tags>
# Consume them with docker-compose.prod.yml by setting:
#   REGISTRY=ghcr.io/<owner>  IMAGE_TAG=<tag>

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Extra image tag to apply (in addition to sha + branch)'
        required: false
        default: ''
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build & push ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # name = image name; dockerfile = path (services live under services/,
        # the static portals under apps/). Portals additionally consume VITE_*
        # build args (baked into the bundle at build time — see below).
        include:
          - { name: socket-gateway, dockerfile: services/socket-gateway/Dockerfile }
          - { name: workers, dockerfile: services/workers/Dockerfile }
          - { name: ai-gateway, dockerfile: services/ai-gateway/Dockerfile }
          - { name: agent-portal, dockerfile: apps/agent-portal/Dockerfile }
          - { name: admin-portal, dockerfile: apps/admin-portal/Dockerfile }
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '' }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # VITE_* are consumed only by the portal images (baked into the bundle
          # at build time). Set them as repo Variables for a real deploy; unset
          # falls back to the Dockerfile ARG defaults. Harmless for the services
          # (unused ARGs). Never put secrets here — they ship to the browser.
          build-args: |
            VITE_DIRECTUS_URL=${{ vars.VITE_DIRECTUS_URL }}
            VITE_SOCKET_URL=${{ vars.VITE_SOCKET_URL }}
            VITE_AI_GATEWAY_URL=${{ vars.VITE_AI_GATEWAY_URL }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
          provenance: false

  summary:
    name: Release summary
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Write summary
        run: |
          {
            echo "## Deploy complete"
            echo ""
            echo "Pushed images to \`ghcr.io/${{ github.repository_owner }}/<image>\`:"
            echo "- socket-gateway"
            echo "- workers"
            echo "- ai-gateway"
            echo "- agent-portal (static SPA / nginx)"
            echo "- admin-portal (static SPA / nginx)"
            echo ""
            echo "Roll out with:"
            echo '```'
            echo "REGISTRY=ghcr.io/${{ github.repository_owner }} IMAGE_TAG=sha-${{ github.sha }} \\"
            echo "  docker compose -f docker-compose.prod.yml --env-file .env.prod up -d"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
