name: Deploy

# Builds the three Node service images and pushes them to GHCR.
# - Manual runs (workflow_dispatch) let you ship any branch on demand.
# - Pushing a release tag (v1.2.3) builds + tags a versioned release.
#
# Images: ghcr.io/<owner>/<service>:<tags>
# Consume them with docker-compose.prod.yml by setting:
#   REGISTRY=ghcr.io/<owner>  IMAGE_TAG=<tag>

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Extra image tag to apply (in addition to sha + branch)'
        required: false
        default: ''
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build & push ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [socket-gateway, workers, ai-gateway]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '' }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          provenance: false

  summary:
    name: Release summary
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Write summary
        run: |
          {
            echo "## Deploy complete"
            echo ""
            echo "Pushed images to \`ghcr.io/${{ github.repository_owner }}/<service>\`:"
            echo "- socket-gateway"
            echo "- workers"
            echo "- ai-gateway"
            echo ""
            echo "Roll out with:"
            echo '```'
            echo "REGISTRY=ghcr.io/${{ github.repository_owner }} IMAGE_TAG=sha-${{ github.sha }} \\"
            echo "  docker compose -f docker-compose.prod.yml --env-file .env.prod up -d"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
