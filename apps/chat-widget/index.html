<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Yiji Support</title>
    <meta name="theme-color" content="#ffffff" />
    <link rel="icon" type="image/png" href="/yiji-logo.png" />
    <link rel="apple-touch-icon" href="/yiji-logo.png" />
    <meta name="description" content="Yiji customer support — chat with our team." />
    <style>
      :root {
        --bg: oklch(0.965 0.003 250);
        --muted: oklch(0.455 0.012 250);
      }
      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }
      html,
      body {
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          'SF Pro Text',
          ui-sans-serif,
          system-ui,
          -apple-system,
          'Segoe UI',
          Roboto,
          'Helvetica Neue',
          Arial,
          sans-serif;
        /* Soft branded backdrop; on mobile the chat fills the screen and covers it. */
        background:
          radial-gradient(at 15% 0%, oklch(0.58 0.097 196 / 0.08) 0%, transparent 55%),
          radial-gradient(at 100% 100%, oklch(0.58 0.097 196 / 0.06) 0%, transparent 55%), var(--bg);
        min-height: 100dvh;
        -webkit-font-smoothing: antialiased;
      }

      /* Faint centered brand watermark behind the chat (desktop only). */
      .backdrop {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        gap: 10px;
        pointer-events: none;
        opacity: 0.5;
      }
      .backdrop img {
        width: 46px;
        height: 46px;
        opacity: 0.6;
      }
      .backdrop span {
        font-size: 12px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        font-weight: 600;
        color: var(--muted);
      }
      @media (max-width: 480px) {
        .backdrop {
          display: none;
        }
      }

      /* This page IS the chat: on desktop, center the auto-opened panel and give
         it a comfortable app-like height instead of the corner-launcher layout.
         The launcher is hidden while open (the chat is the page); it reappears
         only if the customer closes the conversation, so they can reopen it.
         Mobile keeps the widget's native fullscreen panel. */
      @media (min-width: 481px) {
        /* !important + descendant selector to beat the widget's own styles.css,
           which is injected after this <style> and would otherwise win. */
        .yiji-widget .yiji-panel {
          position: fixed !important;
          top: 50% !important;
          left: 50% !important;
          right: auto !important;
          bottom: auto !important;
          inset-inline-end: auto !important;
          transform: translate(-50%, -50%) !important;
          transform-origin: center !important;
          width: 420px !important;
          height: min(680px, 92dvh) !important;
        }
        .yiji-widget.yiji-open .yiji-launcher {
          display: none !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="backdrop" aria-hidden="true">
      <img src="/yiji-logo.png" alt="" />
      <span>Yiji Support</span>
    </div>
    <script type="module" src="/src/demo.ts"></script>
  </body>
</html>
